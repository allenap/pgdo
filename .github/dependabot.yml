version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    groups:
      dependencies:
        patterns:
          - "*"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
  - package-ecosystem: "github-actions"
    directory: "/"
    groups:
      actions:
        patterns:
          - "*"
    schedule:
      interval: weekly
